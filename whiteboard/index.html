<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteBoard</title>
</head>
<style>
    body{
    margin:0;
    padding:0;
    font-family: 'Courier New', Courier, monospace;
    background-color: rgb(37, 36, 33);
    color :white;
    display:flex;
    flex-direction:column;
    align-items: center;
    justify-content: center;
    height:100vh;
    }
    #control{
        margin:15px;
        text-align: center;
    }
    button{
        padding:10px 20px;
        font-size:16px;
        background-color: rgb(156, 80, 19);
        color:white;
        border:none;
        border-radius: 5px;
        cursor:pointer;
    }
    button:hover{
        background-color: rgb(196,94,57);
    }
    canvas{
        border:3px solid whitesmoke;
        background-color: rgb(112, 85, 85);
        border-radius: 8px;
        cursor:crosshair;
        transition: background-color 0.3s ease;
    }
</style>
<body>
     <div id ="control">
        <button id="clearBtn">Clear Board</button>
        <p><strong>Tip:</strong>Right Click to change the brush colour | Double Click to change bg colour</p>
     </div> 
     <canvas id="paintCanvas" width ="800" height ="500"></canvas>
    <script src="script.js"></script>
    
</body>
</html>
