
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card - Priyanshi Yadav</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <p class="top-credit">Design by priyanshi</p>
 
  <div class="card">
 
    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="university-tag">
        <div class="uni-icon">🎓</div>
        <div class="uni-text">
          <p class="uni-name">Parul</p>
          <p class="uni-name">University</p>
        </div>
      </div>
      <div class="circle-deco">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
      </div>
    </div>
 
    <!-- TITLE -->
    <div class="title-block">
      <h1 class="main-title">DATA</h1>
      <h1 class="main-title">SCIENTIST</h1>
    </div>
 
    <!-- PHOTO AREA -->
    <div class="photo-area">
      <div class="ring-bg">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
      </div>
      <img src="photo.jpg" alt="Profile Photo" class="profile-img" />
    </div>
 
    <!-- NAME BANNER -->
    <div class="name-banner">
      <h2 class="name-text">PRIYANSHI</h2>
    </div>
 
    <!-- PROFILE INFO -->
    <div class="info-block">
      <p class="full-name">Computer Science Student(3rd year)</p>
      <br>
      <p class="role-tag">Data Scientist</p>
      <button class="follow-btn"> Follow</button>
    </div>
 
  </div>
 
</body>
</html>
