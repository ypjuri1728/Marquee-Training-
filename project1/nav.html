<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        .navbar{
            display: flex;
            justify-content: space-between;
            background-color: #c2b671;
            padding: 1rem;
            list-style: none;
            color: white;
        }
        .navbar p{
            color: white;
            margin: 0;
            cursor: pointer;
        }
        .navbar p:hover{
            color: #ddd;
        }
        .main,.container{
            background-color:rgb(139, 118, 72);
            height: 97vh;
            text-align: center;
            align-items: center;
            display: flex;
            justify-content: center;
            font-size: 1.5rem;
            flex-direction: column;
        }
            .checkbox{
            position: absolute;
            bottom: 0;
            right: 0;
            margin: 1rem;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <!-- header -->
    <nav>
        <div class="navbar">
       <li><a href="">Home</a></li>
       <li><a href="">About</a></li>
       <li><a href="">Contact</a></li>
       <li><a href="">Blog</a></li>
       <li><a href="">Search</a></li>
       <li><a href="">Login</a></li>
    </div>
    </nav>
<div class="main">
    <div class="container">
    <h1>Welcome to My Website</h1>
    <h4>These are the stupid things </h4>
    </div>
    <div class="checkbox">
    <p>💬</p>
    </div>
</div>
    
    
</body>
</html>
