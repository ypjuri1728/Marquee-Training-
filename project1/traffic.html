<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal</title>
    <style>
        .main{
            width: 200px;
            height: 400px;
            background-color: rgb(18, 13, 13);
            border: 10px solid rgb(130, 118, 118);
            padding: 20px;
            margin: 30px;
        }

        .light{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 15px auto;
        }

        .red{
            background-color: red;
           
        }

        .yellow{
            background-color: yellow;
        }

        .green{
            background-color: green;
        }
    </style>
</head>
<body>

    <div class="main">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>

</body>
</html>
