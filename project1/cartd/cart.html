<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bags Junction</title>
  <link rel="stylesheet" href="cart.css" />
</head>
<body>
 
  <div class="page">
 
    <!-- CARD 1 -->
    <div class="card">
      <div class="card-top">
        <div class="brand">
          <div class="brand-icon">👜</div>
          <div class="brand-name">
            <p class="brand-title">Bags</p>
            <p class="brand-title">Junction</p>
          </div>
        </div>
       
      </div>
 
      <p class="product-label">Guess Bags - 019</p>
 
      <div class="img-wrap">
        <img src="bag1.jpg" alt="Gucci Bag" class="product-img" />
      </div>
 
      <button class="shop-btn">SHOP NOW</button>
      <p class="website">www.bagsjunction.com</p>
    </div>
 
    <!-- CARD 2 -->
    <div class="card card-dark">
      <div class="card-top">
        <div class="brand">
          <div class="brand-icon dark-icon">👜</div>
          <div class="brand-name">
            <p class="brand-title white">Bags</p>
            <p class="brand-title white">Junction</p>
          </div>
        </div>
      
      </div>
 
      <p class="product-label white">Gucci Bags - 099</p>
 
      <div class="img-wrap">
        <img src="bag2.jpg" alt="Gucci Bag 2" class="product-img" />
      </div>
 
      <button class="shop-btn gold-btn">SHOP NOW</button>
      <p class="website gold-text">www.bagsjunction.com</p>
    </div>
 
    <!-- CARD 3 -->
    <div class="card card-gold">
      <div class="card-top">
        <div class="brand">
          <div class="brand-icon">👜</div>
          <div class="brand-name">
            <p class="brand-title dark">Bags</p>
            <p class="brand-title dark">Junction</p>
          </div>
        </div>
       
      </div>
 
      <p class="product-label dark">YSL Bags - 095</p>
 
      <div class="img-wrap">
        <img src="bag3.jpg" alt="Gucci Bag 3" class="product-img" />
      </div>
 
      <button class="shop-btn dark-btn">SHOP NOW</button>
      <p class="website dark">www.bagsjunction.com</p>
    </div>
 
  </div>
 
</body>
</html>
