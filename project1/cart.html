<!DOCTYPE html>
<html>
<head>
    <style>

        .box{
            width:350px;
            height:500px;
            background-color:rgb(124, 124, 112);      
            margin-left:600px;
            margin-top:170px;
            object-fit: cover;
            border-radius: 10px;

        }
        .button{ 
    background:black;
    color:white;

    padding:12px;
    font-size:10px;

    cursor:pointer;

    width:250px;

    border:none;
    border-radius:8px;

    margin-left:50px;
}
        .tt{
            text-align: center;
        }
        .price{
            font-size: x-large;
            color:rgb(33, 76, 49);
            margin-left:150px;
        }
        .img{
            border-radius: 11px;
            position:relative;
        }
        .sales{
    position:absolute;
    top:10px;
    left:10px;

    background-color:red;
    color:white;

    font-weight:bold;
    padding:8px 12px;

    border-radius:20px;
}
.heart{
    position:absolute;
    right:10px;
    top:10px;
    width:35px;
    height:35px;
}

    </style>
</head>

<body>

    <div class="box">
        <div class="img">
            <img src ="https://up.yimg.com/ib/th/id/OIP.zzBzuAkBJQoGSAzofUfFiwHaEK?pid=Api&rs=1&c=1&qlt=95&w=211&h=118" alt="heels" height="200px" width="350px">
            <span class="sales">Sales</span>
            <span class ="heart">
                <img src="https://tse4.mm.bing.net/th/id/OIP.E7NES4khxvDRyPLfXy4VywHaHa?pid=Api&P=0&h=180" alt="heart" width="40px" height="30px">
            </span>
            </div>
            <div class="tt"><h3>Luxury Bag</h3>
                <p>Too glam to give a damn” – that’s pure Gucci energy. If you live for high-end fashion, your captions should reflect that same bold luxury. </p>
            </div>
            <div class="price">
                <p>$2999</p>
            </div>
            <div>
            <button class ="button">Add to Cart</button>
            </div>
            
        </div>
    </div>

</body>
</html>
