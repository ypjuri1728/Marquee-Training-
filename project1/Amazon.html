<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Structure</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>

</head>

<body>

<div style="width: 100vw; height: 100vh; border:3px solid rgb(175, 154, 175)">

    <!-- HEADER -->

    <div style="width: 100vw; height: 15vh; background-color: rgb(208, 200, 211);">

        <div style ="width: 100%; height:60%; border: 4px solid rgb(247, 225, 228)">

            <div style ="display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">

                <h1>Amazon</h1>

                <h2>Vadodara</h2>

                <div>

                    <div style="display: flex; align-items: center; gap: 5px;">

                        <input 
                        type="text" 
                        placeholder="Search for products,brands and more" 
                        style="
                        width: 300px;
                        height: 35px;
                        border-radius: 5px;
                        border: 2px solid black;
                        padding-left: 10px;">

                        <button style="
                        width: 80px;
                        height: 35px;
                        border: none;
                        background-color: orange;
                        border-radius: 5px;">

                        Search

                        </button>

                    </div>

                </div>

                <h2><b>Account</b></h2>

                <h2><b>Cart</b></h2>

            </div>

        </div>

        <div style ="width :100%; height: 40%; border: 4px solid rgb(17, 13, 10)">

            <ul style="display:flex; justify-content: space-evenly; list-style-type: none; align-items:center; height:100%;">

                <li><b><h2>Bestseller</h2></b></li>
                <li><b><h2>Home</h2></b></li>
                <li><b><h2>Mens Wear</h2></b></li>
                <li><b><h2>Kitchen</h2></b></li>
                <li><b><h2>Amazon pay</h2></b></li>

            </ul>

        </div>

    </div>

    <!-- IMAGE SECTION -->

    <div style ="width:100%; height: 79vh; background-color:bisque; position: relative;">

        <img 
        src="https://m.media-amazon.com/images/I/71QcgptqadL._SX3000_.jpg" 
        style="width:100%; height:100%; object-fit:cover;">

        <!-- BOXES -->

        <div style="display: flex;justify-content: space-between; align-items: center; padding: 0 20px;position: absolute;bottom: 40px;width: 100%;">

            <div style="width: 250px; height: 250px; background-color: white; border: 2px solid black;"></div>

            <div style="width: 250px; height: 250px; background-color: white; border: 2px solid black;"></div>

            <div style="width: 250px; height: 250px; background-color: white; border: 2px solid black;"></div>

            <div style="width: 250px; height: 250px; background-color: white; border: 2px solid black;"></div>

        </div>

    </div>

</div>

</body>
</html>
